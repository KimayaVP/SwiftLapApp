name: SwiftLap
options:
  bundleIdPrefix: com.swiftlap
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SwiftLap:
    type: application
    platform: iOS
    sources:
      - path: SwiftLap
      - path: Shared
    dependencies:
      - package: Supabase
        product: Supabase
      - target: SwiftLapWatch
        embed: true
    info:
      path: SwiftLap/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: "SwiftLap uses Face ID to unlock the app and keep you signed in."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes: [com.swiftlap.ios]
    entitlements:
      path: SwiftLap/SwiftLap.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
        # APNs. The value is substituted from APS_ENVIRONMENT below so Debug
        # builds use the sandbox push gateway and Release uses production.
        aps-environment: $(APS_ENVIRONMENT)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftlap.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 98QNV4FG3G
      configs:
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production

  SwiftLapWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: Watch
      - path: Shared
    info:
      path: Watch/Info.plist
      properties:
        WKApplication: true
        WKCompanionAppBundleIdentifier: com.swiftlap.ios
        WKRunsIndependentlyOfCompanionApp: true
        NSHealthShareUsageDescription: "SwiftLap reads your heart rate, swim strokes, and distance to count your laps and tell you when you're getting tired."
        NSHealthUpdateUsageDescription: "SwiftLap saves your swim workouts to the Health app so they show up alongside your other activity."
    entitlements:
      path: Watch/SwiftLapWatch.entitlements
      properties:
        com.apple.developer.healthkit: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftlap.ios.watch
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "4"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 98QNV4FG3G

schemes:
  SwiftLap:
    build:
      targets:
        SwiftLap: all
    run:
      config: Debug
    archive:
      config: Release
  SwiftLapWatch:
    build:
      targets:
        SwiftLapWatch: all
    run:
      config: Debug
