name: SwiftLap
options:
  bundleIdPrefix: com.swiftlap
  deploymentTarget:
    iOS: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: "2.0.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SwiftLap:
    type: application
    platform: iOS
    sources:
      - path: SwiftLap
      - path: Shared
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: SwiftLap/Info.plist
      properties:
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleURLSchemes: [com.swiftlap.ios]
    entitlements:
      path: SwiftLap/SwiftLap.entitlements
      properties:
        com.apple.developer.applesignin: [Default]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftlap.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
